<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Literary Genre Topology</title>
    <!--
      Phase 11 D-86 — no-FOUC first paint. Runs BEFORE the module bundle so the
      correct theme class is on <html> before React mounts. Reads the Zustand
      persist payload ({ state: { theme }, version }) under `lgt-prefs-v1`.
      New users (no stored theme) default to light. On any parse error, fall
      back to light (Rule 1) rather than throwing.
    -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('lgt-prefs-v1');
          var theme = raw ? (JSON.parse(raw).state || {}).theme : null;
          // New user (no stored theme) defaults to light per D-86.
          var effective = theme || 'light';
          if (effective === 'system') {
            effective = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
          }
          if (effective === 'light') document.documentElement.classList.add('light');
        } catch (e) { document.documentElement.classList.add('light'); }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
