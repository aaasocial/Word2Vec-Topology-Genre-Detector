name: planning-files-check

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  reject-zero-byte-planning-files:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if any .planning/**/*.md is 0 bytes
        shell: bash
        run: |
          set -euo pipefail
          FAILED=0
          while IFS= read -r f; do
            if [ "$(wc -c < "$f" | tr -d ' ')" = "0" ]; then
              echo "::error file=$f::0-byte planning file (BUG-04 / PITFALLS.md §15)"
              FAILED=1
            fi
          done < <(find .planning -type f -name '*.md' -print 2>/dev/null || true)
          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi
          echo "All .planning/**/*.md files are non-empty."
