# Per-genre candidate-title shortlist for v2 corpus expansion (Phase 7 output per D-19).
# Phase 8 selects the final 25 or 30 books per genre from these candidate lists.
# All candidates verified to exist on Project Gutenberg (text-fetch source per D-02).
# source_consensus_score = count of curation sources (Goodreads-UCSD shelves, LoC canon lists,
# scholarly canon lists, comparable-project corpora) on which this title appears.
# Higher score = more cross-source consensus that this title is canonical for its genre.
#
# Ordering: candidates are sorted by source_consensus_score descending; ties broken by
# ascending gutenberg_id (deterministic ordering for Phase 8 reproducibility per D-19).
#
# Author-distribution rules:
#   D-07 — no per-author cap inside a genre. Prolific public-domain authors (Austen, Wells,
#          Verne, Zane Grey, Lovecraft, Dumas, etc.) contribute as many candidates as their
#          PD catalogue + curation-source consensus support. Phase 8 still picks the final N.
#   D-08 — every genre's candidate list has >=8 distinct authors (hard constraint, verified
#          by Task 2 audit `05_author_distribution_audit.md`).
#
# v1 baseline: every entry in `corpus/books.yaml` is automatically a candidate with
# source_consensus_score = 4 (it passed v1 curation = effectively all-source consensus).
#
# Decision IDs implemented: D-06, D-07, D-08, D-10, D-19.

curation_sources_used:
  - name: "Goodreads-UCSD shelves"
    role: curation
    pattern: "Best-of-genre shelf membership; UCSD academic mirror (mengtingwan.github.io/data/goodreads.html)"
  - name: "LoC canon lists"
    role: curation
    pattern: "Library of Congress curated genre lists (loc.gov/collections); LCC class P 'Language and Literature' subject headings"
  - name: "Scholarly canon lists"
    role: curation
    pattern: "Modern Library 100 Best Novels, Hugo/Nebula winners (scifi), MWA Edgar (mystery), Bram Stoker (horror), Western Writers of America Hall of Fame, Booker/Pulitzer (literary), Newbery & National Book Award historicals"
  - name: "Comparable-project corpora"
    role: curation
    pattern: "Gutenberg Genre Identification (gjoseph16), Worsham & Kalita 2018, BL Labs blbooksgenre title-level metadata"

